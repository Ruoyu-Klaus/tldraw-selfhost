name: Release MCP Package

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: packages/tldraw-selfhost-mcp
        run: npm ci

      - name: Build
        working-directory: packages/tldraw-selfhost-mcp
        run: npm run build

      - name: Set version from tag
        id: version
        run: |
          TAG=${GITHUB_REF_NAME}          # e.g. v1.2.3
          VERSION=${TAG#v}                # e.g. 1.2.3
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Bump package version to match tag
        working-directory: packages/tldraw-selfhost-mcp
        run: npm version ${{ steps.version.outputs.version }} --no-git-tag-version

      - name: Pack
        working-directory: packages/tldraw-selfhost-mcp
        run: npm pack

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: packages/tldraw-selfhost-mcp/tldraw-selfhost-mcp-${{ steps.version.outputs.version }}.tgz
          body: |
            ## tldraw-selfhost-mcp ${{ steps.version.outputs.tag }}

            ### 使用方式（Cursor / Claude Desktop / Copilot）

            在 MCP 配置里填入：

            ```json
            {
              "mcpServers": {
                "tldraw": {
                  "command": "npx",
                  "args": [
                    "-y",
                    "https://github.com/${{ github.repository }}/releases/download/${{ steps.version.outputs.tag }}/tldraw-selfhost-mcp-${{ steps.version.outputs.version }}.tgz"
                  ],
                  "env": {
                    "TLDRAW_BASE_URL": "https://你的域名",
                    "MCP_TOKEN": "你的 MCP_TOKEN",
                    "CF_ACCESS_CLIENT_ID": "CF Service Token ID（外网必填）",
                    "CF_ACCESS_CLIENT_SECRET": "CF Service Token Secret（外网必填）"
                  }
                }
              }
            }
            ```

            > 升级时把 URL 里的版本号替换为新 Tag 即可。
